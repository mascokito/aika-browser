<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Aika Browser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }

    :root {
      --viridian: #4dba6a;
      --bg: #0a0a0f;
      --bg2: #111118;
      --text: #7dba8a;
      --border: #1a2a1a;
      --font: 'Share Tech Mono', 'Courier New', monospace;
    }

    body { font-family: var(--font); color: var(--text); }

    #addressBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      z-index: 100;
      transition: transform 0.3s ease;
    }
    #addressBar.hidden { transform: translateY(-100%); }

    #browseView {
      position: fixed;
      top: 48px; left: 0; right: 0; bottom: 0;
      transition: opacity 0.3s ease;
    }
    #browseView.hidden { opacity: 0; pointer-events: none; }
    #browserFrame { width: 100%; height: 100%; border: none; background: #000; }

    #streamBadge {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--viridian);
      color: var(--bg);
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      z-index: 200;
      transition: opacity 0.3s;
      min-height: 44px;
      display: flex;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
    }
    #streamBadge.hidden { opacity: 0; pointer-events: none; }

    #streamPicker {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg2);
      border-top: 1px solid var(--viridian);
      max-height: 50vh;
      overflow-y: auto;
      z-index: 300;
      transition: transform 0.3s ease;
    }
    #streamPicker.hidden { transform: translateY(100%); }
    #streamPickerHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--viridian);
      font-size: 13px;
    }
    .stream-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      font-size: 12px;
      min-height: 48px;
      -webkit-tap-highlight-color: transparent;
    }
    .stream-item:active { background: #1a2a1a; }
    .stream-type {
      background: var(--viridian);
      color: var(--bg);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: bold;
      min-width: 40px;
      text-align: center;
    }
    .stream-domain {
      color: #aaa;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #playbackView {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000;
      z-index: 50;
      transition: opacity 0.3s ease;
    }
    #playbackView.hidden { opacity: 0; pointer-events: none; }
    #aikavid {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
    }
    #aikaCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #playbackControls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      padding: 24px 16px 16px;
      z-index: 60;
    }
    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .ctrl-label {
      color: #666;
      font-size: 10px;
      min-width: 60px;
    }
    .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
    #controlsRow1 { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
    #controlsRow2 { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
    .ctrl-actions { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }

    button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      font-family: var(--font);
      font-size: 11px;
      cursor: pointer;
      border-radius: 3px;
      min-height: 44px;
      min-width: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    button.active {
      background: var(--viridian);
      color: var(--bg);
      border-color: var(--viridian);
    }
    #btnKill {
      border-color: #e05050;
      color: #e05050;
    }
    #btnKill:active { background: #e05050; color: #fff; }

    #urlInput {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      font-family: var(--font);
      font-size: 13px;
      border-radius: 3px;
      min-height: 44px;
    }
    #btnGo {
      background: var(--viridian);
      color: var(--bg);
      border-color: var(--viridian);
      font-weight: bold;
    }

    input[type=range] {
      accent-color: var(--viridian);
      width: 80px;
      min-height: 44px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="addressBar">
    <button id="btnBack" type="button" aria-label="Back">←</button>
    <button id="btnForward" type="button" aria-label="Forward">→</button>
    <button id="btnRefresh" type="button" aria-label="Refresh">↺</button>
    <input id="urlInput" type="url" placeholder="Enter URL..." autocomplete="off" spellcheck="false">
    <button id="btnGo" type="button">GO</button>
  </div>

  <div id="browseView">
    <iframe id="browserFrame"
      title="Browse"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"
      allow="autoplay; fullscreen"
      src="about:blank">
    </iframe>
  </div>

  <div id="streamPicker" class="hidden">
    <div id="streamPickerHeader">
      <span id="streamCount">0 streams detected</span>
      <button id="btnDismissPicker" type="button" aria-label="Close">✕</button>
    </div>
    <div id="streamList"></div>
  </div>

  <div id="streamBadge" class="hidden">
    <span id="badgeText">● 0 streams</span>
  </div>

  <div id="playbackView" class="hidden">
    <video id="aikavid" playsinline muted crossorigin="anonymous"></video>
    <canvas id="aikaCanvas"></canvas>

    <div id="playbackControls">
      <div id="controlsRow1">
        <div class="ctrl-group">
          <span class="ctrl-label">EFFECT</span>
          <div class="btn-group">
            <button class="effect-btn active" type="button" data-effect="ascii">ASCII</button>
            <button class="effect-btn" type="button" data-effect="halftone">HALFTONE</button>
            <button class="effect-btn" type="button" data-effect="off">OFF</button>
          </div>
        </div>
        <div class="ctrl-group">
          <span class="ctrl-label">COLOR</span>
          <div class="btn-group">
            <button class="color-btn active" type="button" data-color="viridian">VRD</button>
            <button class="color-btn" type="button" data-color="midnight">MID</button>
            <button class="color-btn" type="button" data-color="amber">AMB</button>
            <button class="color-btn" type="button" data-color="crimson">CRM</button>
            <button class="color-btn" type="button" data-color="ghost">GST</button>
          </div>
        </div>
      </div>
      <div id="controlsRow2">
        <div class="ctrl-group">
          <span class="ctrl-label">SIZE <span id="sizeVal">8</span></span>
          <input type="range" id="sizeSlider" min="4" max="24" value="8">
        </div>
        <div class="ctrl-group">
          <span class="ctrl-label">BRIGHT <span id="brightVal">1.4</span></span>
          <input type="range" id="brightSlider" min="0.5" max="3.0" step="0.1" value="1.4">
        </div>
        <div class="ctrl-group ctrl-actions">
          <button id="btnMute" type="button">UNMUTE</button>
          <button id="btnKill" type="button">KILL STREAM</button>
        </div>
      </div>
    </div>
  </div>

<script>
const state = {
  effect: 'ascii',
  color: 'viridian',
  size: 8,
  brightness: 1.4,
  muted: true,
  streams: [],
  pickerOpen: false,
  playbackActive: false,
  rafId: null,
  sampleCanvas: null,
  sampleCtx: null,
};

async function registerSW() {
  if (!('serviceWorker' in navigator)) {
    console.warn('[aika] Service Worker not supported');
    return false;
  }
  try {
    const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
    console.log('[aika] SW registered:', reg.scope);
    await navigator.serviceWorker.ready;
    return true;
  } catch (e) {
    console.warn('[aika] SW registration failed:', e.message);
    return false;
  }
}

const EMBED_PATTERNS = [
  /mp4upload\.com\/embed/i,
  /mp4upload\.com\/[a-z0-9]+$/i,
  /streamtape\.com\/e\//i,
  /doodstream\.com\/e\//i,
];

async function resolveEmbedStream(stream) {
  if (!EMBED_PATTERNS.some(p => p.test(stream.realUrl))) {
    return [stream];
  }

  try {
    const res = await fetch('/proxy-embed?url=' + encodeURIComponent(stream.realUrl));
    const data = await res.json();
    if (data.streams && data.streams.length > 0) {
      return data.streams.map(s => ({
        proxyUrl: '/proxy?url=' + encodeURIComponent(s.url),
        realUrl: s.url,
        type: s.type,
        domain: new URL(s.url).hostname,
        source: 'embed-follow',
      }));
    }
  } catch (e) {
    console.warn('[aika] embed follow failed:', e.message);
  }
  return [];
}

async function onStreamDetected(stream) {
  if (state.playbackActive) return;

  const resolved = await resolveEmbedStream(stream);
  let added = false;
  resolved.forEach(s => {
    const exists = state.streams.some(x => x.realUrl === s.realUrl);
    if (!exists) {
      state.streams.push(s);
      added = true;
      console.log('[aika] Stream detected:', s.type, s.domain, s.source || '');
    }
  });
  if (added) updateStreamBadge();
}

function updateStreamBadge() {
  const count = state.streams.length;
  streamCount.textContent = `${count} stream${count !== 1 ? 's' : ''} detected`;
  if (count === 0) {
    streamBadge.classList.add('hidden');
    return;
  }
  streamBadge.classList.remove('hidden');
  badgeText.textContent = `● ${count} stream${count > 1 ? 's' : ''} detected`;
}

function openStreamPicker() {
  streamList.innerHTML = '';
  state.streams.forEach((stream) => {
    const item = document.createElement('div');
    item.className = 'stream-item';
    item.innerHTML = `
      <span class="stream-type">${stream.type}</span>
      <span class="stream-domain">${stream.domain}</span>
    `;
    item.addEventListener('click', () => loadStream(stream));
    streamList.appendChild(item);
  });
  streamPicker.classList.remove('hidden');
  streamBadge.classList.add('hidden');
  state.pickerOpen = true;
}

function closeStreamPicker() {
  streamPicker.classList.add('hidden');
  state.pickerOpen = false;
  if (state.streams.length > 0 && !state.playbackActive) {
    streamBadge.classList.remove('hidden');
  }
}

function loadStream(stream) {
  closeStreamPicker();
  aikavid.src = stream.proxyUrl;
  aikavid.muted = true;
  state.muted = true;
  btnMute.textContent = 'UNMUTE';
  btnMute.classList.remove('active');
  aikavid.load();
  aikavid.play().catch(() => {});
  enterPlaybackMode();
}

function enterPlaybackMode() {
  state.playbackActive = true;
  addressBar.classList.add('hidden');
  browseView.classList.add('hidden');
  streamBadge.classList.add('hidden');
  streamPicker.classList.add('hidden');
  playbackView.classList.remove('hidden');
  startRenderLoop();
}

function killStream() {
  state.playbackActive = false;
  aikavid.pause();
  aikavid.removeAttribute('src');
  aikavid.load();
  cancelAnimationFrame(state.rafId);
  state.rafId = null;

  const ctx = aikaCanvas.getContext('2d');
  ctx.clearRect(0, 0, aikaCanvas.width, aikaCanvas.height);
  aikaCanvas.style.display = 'block';

  playbackView.classList.add('hidden');
  browseView.classList.remove('hidden');
  addressBar.classList.remove('hidden');

  state.streams = [];
  state.pickerOpen = false;
  updateStreamBadge();
}

const DENSITY = ' .:-=+*#%@█▓▒░';

function colorForLuma(luma) {
  const t = Math.max(0, Math.min(1, luma * state.brightness));
  const c = state.color;
  if (c === 'amber') return `rgb(${Math.round(212*t)},${Math.round(132*t)},${Math.round(42*t)})`;
  if (c === 'midnight') return `rgb(5,16,${Math.round(27+t*80)})`;
  if (c === 'crimson') return `rgb(${Math.round(40+t*200)},8,24)`;
  if (c === 'ghost') { const g = Math.round(120+t*120); return `rgb(${g},${g},${g+8})`; }
  return `rgb(${Math.round(46+t*79)},${Math.round(125+t*43)},${Math.round(107+t*35)})`;
}

function quantizeColor(r, g, b) {
  const br = state.brightness;
  return `rgb(${Math.min(255,Math.round(Math.min(255,r*br)/32)*32)},${Math.min(255,Math.round(Math.min(255,g*br)/32)*32)},${Math.min(255,Math.round(Math.min(255,b*br)/32)*32)})`;
}

function ensureSampleCanvas(vw, vh) {
  const W = 320, H = Math.max(1, Math.round(W * (vh / vw)));
  if (!state.sampleCanvas) {
    state.sampleCanvas = document.createElement('canvas');
    state.sampleCtx = state.sampleCanvas.getContext('2d', { willReadFrequently: true });
  }
  if (state.sampleCanvas.width !== W || state.sampleCanvas.height !== H) {
    state.sampleCanvas.width = W;
    state.sampleCanvas.height = H;
  }
  return { w: W, h: H, ctx: state.sampleCtx };
}

function renderFrame() {
  state.rafId = requestAnimationFrame(renderFrame);
  if (aikavid.paused || aikavid.ended || !aikavid.videoWidth) return;

  if (state.effect === 'off') {
    aikaCanvas.style.display = 'none';
    return;
  }
  aikaCanvas.style.display = 'block';

  const vw = aikavid.videoWidth;
  const vh = aikavid.videoHeight;
  aikaCanvas.width = vw;
  aikaCanvas.height = vh;

  const ctx = aikaCanvas.getContext('2d');
  const s = ensureSampleCanvas(vw, vh);

  try {
    s.ctx.drawImage(aikavid, 0, 0, s.w, s.h);
  } catch (e) {
    return;
  }

  const img = s.ctx.getImageData(0, 0, s.w, s.h);
  const data = img.data;
  const sx = s.w / vw, sy = s.h / vh;
  const cell = Math.max(state.effect === 'halftone' ? 2 : 4, state.size | 0);

  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, vw, vh);

  if (state.effect === 'halftone') {
    const maxR = cell / 2;
    const buckets = {};
    for (let cy = 0; cy < vh; cy += cell) {
      for (let cx = 0; cx < vw; cx += cell) {
        const px = Math.min(s.w-1, ((cx+cell/2)*sx)|0);
        const py = Math.min(s.h-1, ((cy+cell/2)*sy)|0);
        const ii = (py*s.w+px)*4;
        if (data[ii+3] < 10) continue;
        const luma = (data[ii]*0.299+data[ii+1]*0.587+data[ii+2]*0.114)/255;
        if (luma < 0.04) continue;
        const rad = Math.max(0.5, maxR*(0.2+luma*0.8));
        const ck = quantizeColor(data[ii], data[ii+1], data[ii+2]);
        if (!buckets[ck]) buckets[ck] = [];
        buckets[ck].push({ x: cx+cell/2, y: cy+cell/2, r: rad });
      }
    }
    for (const col in buckets) {
      const dots = buckets[col];
      ctx.fillStyle = col;
      ctx.beginPath();
      for (const d of dots) {
        ctx.moveTo(d.x+d.r, d.y);
        ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
      }
      ctx.fill();
    }
  } else {
    const charB = {};
    ctx.font = `${cell}px "Share Tech Mono","Courier New",monospace`;
    ctx.textBaseline = 'top';
    for (let y = 0; y < vh; y += cell) {
      for (let x = 0; x < vw; x += cell) {
        const spx = Math.min(s.w-1, ((x+cell/2)*sx)|0);
        const spy = Math.min(s.h-1, ((y+cell/2)*sy)|0);
        const si = (spy*s.w+spx)*4;
        if (data[si+3] < 10) continue;
        const avg = (data[si]*0.299+data[si+1]*0.587+data[si+2]*0.114)/255;
        if (avg < 0.04) continue;
        const ch = DENSITY[DENSITY.length-1-Math.min(DENSITY.length-1,Math.floor(avg*(DENSITY.length-1)))];
        const fill = colorForLuma(avg);
        if (!charB[fill]) charB[fill] = [];
        charB[fill].push({ x, y, ch });
      }
    }
    for (const fill in charB) {
      ctx.fillStyle = fill;
      for (const g of charB[fill]) ctx.fillText(g.ch, g.x, g.y);
    }
  }
}

function startRenderLoop() {
  cancelAnimationFrame(state.rafId);
  state.rafId = requestAnimationFrame(renderFrame);
}

function navigate(url) {
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  urlInput.value = url;
  state.streams = [];
  updateStreamBadge();
  closeStreamPicker();
  browserFrame.src = '/proxy?url=' + encodeURIComponent(url);
}

const addressBar = document.getElementById('addressBar');
const urlInput = document.getElementById('urlInput');
const btnGo = document.getElementById('btnGo');
const btnBack = document.getElementById('btnBack');
const btnForward = document.getElementById('btnForward');
const btnRefresh = document.getElementById('btnRefresh');
const browseView = document.getElementById('browseView');
const browserFrame = document.getElementById('browserFrame');
const streamBadge = document.getElementById('streamBadge');
const badgeText = document.getElementById('badgeText');
const streamPicker = document.getElementById('streamPicker');
const streamList = document.getElementById('streamList');
const streamCount = document.getElementById('streamCount');
const btnDismissPicker = document.getElementById('btnDismissPicker');
const playbackView = document.getElementById('playbackView');
const aikavid = document.getElementById('aikavid');
const aikaCanvas = document.getElementById('aikaCanvas');
const btnKill = document.getElementById('btnKill');
const btnMute = document.getElementById('btnMute');
const sizeSlider = document.getElementById('sizeSlider');
const sizeVal = document.getElementById('sizeVal');
const brightSlider = document.getElementById('brightSlider');
const brightVal = document.getElementById('brightVal');

btnGo.addEventListener('click', () => navigate(urlInput.value.trim()));
urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(urlInput.value.trim()); });
btnBack.addEventListener('click', () => { try { browserFrame.contentWindow?.history.back(); } catch (_) {} });
btnForward.addEventListener('click', () => { try { browserFrame.contentWindow?.history.forward(); } catch (_) {} });
btnRefresh.addEventListener('click', () => { try { browserFrame.contentWindow?.location.reload(); } catch (_) {} });

streamBadge.addEventListener('click', openStreamPicker);
btnDismissPicker.addEventListener('click', closeStreamPicker);
btnKill.addEventListener('click', killStream);

btnMute.addEventListener('click', () => {
  aikavid.muted = !aikavid.muted;
  state.muted = aikavid.muted;
  btnMute.textContent = aikavid.muted ? 'UNMUTE' : 'MUTE';
  btnMute.classList.toggle('active', !aikavid.muted);
});

document.querySelectorAll('.effect-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.effect-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.effect = btn.dataset.effect;
  });
});

document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.color = btn.dataset.color;
  });
});

sizeSlider.addEventListener('input', () => {
  state.size = parseInt(sizeSlider.value, 10);
  sizeVal.textContent = state.size;
});

brightSlider.addEventListener('input', () => {
  state.brightness = parseFloat(brightSlider.value);
  brightVal.textContent = state.brightness.toFixed(1);
});

window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || typeof d !== 'object') return;
  if (d.type === 'navigate' && d.url) navigate(d.url);
  if (d.type === 'aika-stream-detected' && d.stream) onStreamDetected(d.stream);
});

navigator.serviceWorker?.addEventListener('message', (event) => {
  const { type, stream } = event.data || {};
  if (type === 'aika-stream-detected') onStreamDetected(stream);
});

registerSW();
</script>
</body>
</html>
